<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk SMS Portal | Data4Ghana Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/master-dashboard.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>
    
    <meta name="theme-color" content="#020817">
    <style>
        .sms-card {
            background: var(--bg-dark);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 32px;
            max-width: 800px;
            margin: 0 auto 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .form-input, .form-textarea {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-input:focus, .form-textarea:focus {
            border-color: var(--blue);
            background: rgba(255,255,255,0.06);
            outline: none;
        }

        .char-counter {
            text-align: right;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .btn-send {
            width: 100%;
            background: var(--blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .btn-send:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #progressSection {
            display: none;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--glass-border);
        }

        .progress-bar-container {
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: var(--blue);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status-logs {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
            color: var(--text-muted);
        }

        .log-entry { margin-bottom: 4px; }
        .log-entry.success { color: var(--emerald); }
        .log-entry.error { color: #ef4444; }
    </style>
</head>
<body>
    
    <div id="admin-sidebar-container"></div>
    
    <main class="master-main">
        <header class="top-nav" style="position: relative;">
            <div style="display:flex; align-items:center; gap:16px; z-index: 2; position: relative;">
                <button class="admin-menu-btn" onclick="toggleAdminMenu()">☰</button>
            </div>
            
            <div class="page-title-group" style="position: absolute; left: 0; right: 0; text-align: center; pointer-events: none; z-index: 1;">
                <h1 id="pageTitle" style="pointer-events: auto;">Bulk SMS Portal</h1>
            </div>
            
            <div class="admin-profile" style="z-index: 2; position: relative;">
                <span class="status-live">BulkSMSGH API Connected</span>
            </div>
        </header>

        <section class="sms-card">
            <div class="form-group">
                <label>Target Audience</label>
                <select id="recipientType" class="form-input" onchange="toggleCustomNumbers()">
                    <option value="all">All Registered Users</option>
                    <option value="custom">Custom Phone Numbers (Comma separated)</option>
                </select>
            </div>

            <div id="customNumbersGroup" class="form-group" style="display: none;">
                <label>Manual Phone List</label>
                <textarea id="manualNumbers" class="form-textarea" placeholder="e.g. 0244000000, 0550000000..."></textarea>
                <div class="char-counter">Format: 233... or 024...</div>
            </div>

            <div class="form-group">
                <label>Message Content</label>
                <textarea id="smsMessage" class="form-textarea" placeholder="Type your broadcast message here..." oninput="updateCharCount()"></textarea>
                <div class="char-counter"><span id="charCount">0</span> characters | <span id="smsPages">0</span> SMS unit(s)</div>
            </div>

            <button id="sendBtn" class="btn-send" onclick="startSmsBroadcast()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                Deploy Broadcast
            </button>

            <div id="progressSection">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:12px;">
                    <span id="progressLabel" style="font-weight:700; color:white;">Dispatching...</span>
                    <span id="progressPercent" style="color:var(--text-muted);">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div class="status-logs" id="statusLogs">
                    <!-- Logs injected here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="js/admin-core.js"></script>
    <script src="js/admin-menu.js"></script>
    <script src="js/admin-bulk-sms.js"></script>
</body>
</html>
