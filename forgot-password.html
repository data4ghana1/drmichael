<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password - Data4Ghana</title>

<link rel="stylesheet" href="css/login.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- Supabase Database Connection --><script src="js/supabase.js"></script>
<script src="js/security.js"></script>

<style>
  .info-box {
    background: #f0f7ff;
    border: 1px solid #bddeff;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: #1e5a9e;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .success-box {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: #166534;
    margin-bottom: 20px;
    line-height: 1.5;
    display: none;
  }
  .error-box {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: #991b1b;
    margin-bottom: 20px;
    line-height: 1.5;
    display: none;
  }
</style>

    <meta name="theme-color" content="#0b1220">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Data4Ghana">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="images/icons/apple-touch-icon.png">
</head>

<body>

<div class="login-container">

<a class="back" href="login.html">← Back to Sign In</a>

<div class="logo">
<h2>📱 Data4Ghana</h2>
<p>Reset your password</p>
</div>

<div class="card">

<h1>Forgot Password</h1>
<p class="subtitle">Enter your email address to receive a password reset link</p>

<div class="info-box">
  We'll send a reset link to your <strong>email</strong> and a notification to your <strong>phone number</strong> on file.
</div>

<div class="success-box" id="successBox"></div>
<div class="error-box" id="errorBox"></div>

<form id="forgotForm">

<label>Email Address</label>
<input type="email" id="email" placeholder="Enter your registered email" required>

<button type="submit" id="resetBtn">Send Reset Link</button>

<p class="signup">
Remember your password?
<a href="login.html">Sign In</a>
</p>

</form>

</div>

</div>

<script src="js/forgot-password.js"></script>

    <script src="js/pwa-install.js"></script>
</body>
</html>
