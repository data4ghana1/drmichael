<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFA History Dashboard | Data4Ghana</title>
    <link rel="stylesheet" href="css/afa.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020817">
    <link rel="apple-touch-icon" href="images/icons/apple-touch-icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .filter-bar {
            background: #ffffff;
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border-light);
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            box-shadow: var(--shadow-soft);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: var(--bg-tint);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            transition: all 0.3s;
        }

        .filter-input:focus {
            outline: none;
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .stats-grid-mini {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card-mini {
            background: #ffffff;
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .scm-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .scm-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
        }

        .scm-value.primary { color: var(--primary); }
        .scm-value.emerald { color: var(--accent-emerald); }
        .scm-value.amber { color: #f59e0b; }

        /* Table Refinement */
        #fullHistoryTable th {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 16px;
            border-bottom: 2px solid var(--border-light);
            background: #fafafa;
        }

        #fullHistoryTable td {
            padding: 16px;
            vertical-align: middle;
            border-bottom: 1px solid var(--border-light);
        }

        #fullHistoryTable tr:hover td {
            background: #f8fafc;
        }

        /* Card Grid Styles */
        .history-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .history-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .history-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .hc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hc-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .hc-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .hc-label {
            color: var(--text-muted);
            font-weight: 600;
        }

        .hc-value {
            color: var(--text-main);
            font-weight: 700;
            text-align: right;
        }

        .hc-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px dashed var(--border-light);
            margin-top: auto;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .status-success { background: rgba(16,185,129,0.1); color: var(--accent-emerald); }
        .status-failed { background: rgba(239,68,68,0.1); color: #ef4444; }
        .status-pending { background: rgba(37,99,235,0.1); color: var(--primary); }
        .tier-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .tier-badge.premium {
            background: rgba(79, 70, 229, 0.1);
            color: #4f46e5;
        }
        .tier-badge.standard {
            background: rgba(100, 116, 139, 0.1);
            color: #64748b;
        }
    </style>
</head>

<body class="afa-page afa-route-page">

    <button class="menu-btn" onclick="openMenu()">☰</button>
    <div id="menu-container"></div>

    <!-- HERO BANNER -->
    <div class="afa-hero normal">
        <div class="hero-content">
            <a href="afa.html" class="back-dashboard-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to AFA Portal
            </a>
            <h1>AFA History</h1>
            <p>Unified audit log of all your AFA registrations across all service tiers.</p>
        </div>
        <div class="hero-stats">
            <div class="stat-item">
                <span class="stat-label">Wallet Balance</span>
                <span class="stat-value" id="afaWalletDisplay">₵0.00</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-label">Total Logs</span>
                <span class="stat-value" id="totalLogs">0</span>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="container-premium">
        
        <!-- AGGREGATE STATS -->
        <div class="stats-grid-mini">
            <div class="stat-card-mini">
                <span class="scm-label">Total Enrollments</span>
                <span class="scm-value" id="countTotal">0</span>
            </div>
            <div class="stat-card-mini">
                <span class="scm-label">Success Rate</span>
                <span class="scm-value emerald" id="successRate">0%</span>
            </div>
            <div class="stat-card-mini">
                <span class="scm-label">Premium Enrollments</span>
                <span class="scm-value primary" id="countPremium">0</span>
            </div>
            <div class="stat-card-mini">
                <span class="scm-label">Standard Enrollments</span>
                <span class="scm-value" id="countNormal">0</span>
            </div>
        </div>

        <!-- FILTERING -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>Search History</label>
                <input type="text" id="searchFilter" class="filter-input" placeholder="Name, Phone or Activity...">
            </div>
            <div class="filter-group">
                <label>AFA Tier</label>
                <select id="tierFilter" class="filter-input">
                    <option value="all">All Tiers</option>
                    <option value="premium">Premium</option>
                    <option value="normal">Standard</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Status</label>
                <select id="statusFilter" class="filter-input">
                    <option value="all">All Statuses</option>
                    <option value="completed">Completed / Success</option>
                    <option value="pending">In Progress</option>
                    <option value="failed">Failed / Rejected</option>
                </select>
            </div>
        </div>

        <!-- HISTORY CARDS GRID -->
        <div class="history-section">
            <div id="fullHistoryGrid" class="history-grid-container">
                <div class="history-card" style="grid-column: 1 / -1; align-items: center; padding: 60px;">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <span>Consolidating history...</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- DETAILS MODAL -->
    <div id="recordModal" class="modal-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.3s ease;">
        <div class="modal-content" style="background: #ffffff; border-radius: 24px; padding: 32px; width: 100%; max-width: 480px; position: relative; transform: translateY(20px); transition: transform 0.3s ease; box-shadow: 0 20px 40px rgba(0,0,0,0.2);">
            <button onclick="closeModal()" style="position: absolute; top: 20px; right: 20px; background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #64748b; font-size: 18px; transition: all 0.2s;">×</button>
            <h3 style="margin-bottom: 24px; font-size: 20px; font-weight: 800; color: #0f172a;">Registration Details</h3>
            
            <div id="modalBody" style="display: flex; flex-direction: column; gap: 16px;">
                <!-- dynamic content injected here -->
            </div>
            
            <button onclick="closeModal()" style="width: 100%; margin-top: 24px; padding: 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; font-weight: 700; color: #475569; cursor: pointer; transition: all 0.2s;">Close</button>
        </div>
    </div>


    <script src="js/menu.js"></script>
    <script src="js/afa-history.js"></script>
    <script src="js/pwa-install.js"></script>
</body>
</html>
