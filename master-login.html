<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Login | Data4Ghana Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/master-login.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>
    <meta name="theme-color" content="#020817">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-decoration">
            <div class="glow glow-1"></div>
            <div class="glow glow-2"></div>
        </div>
        
        <div class="auth-card glass-panel">
            <div class="master-badge">MASTER PORTAL</div>
            <div class="auth-header">
                <h1>Command Center</h1>
                <p>Sign in to access global admin controls.</p>
            </div>
            
            <form id="masterLoginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Administrator Email</label>
                    <div class="input-icon-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <input type="email" id="email" required placeholder="admin@data4ghana.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">System Password</label>
                    <div class="input-icon-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="password" required placeholder="••••••••">
                        <button type="button" class="btn-toggle-password" onclick="togglePassword()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary auth-submit">
                    Initialize Session
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </form>
            
            <div class="auth-footer">
                <a href="login.html" class="link-secondary">Return to Client Portal</a>
            </div>
        </div>
    </div>
    
    <script src="js/master-login.js"></script>
</body>
</html>
