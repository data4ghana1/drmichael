<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Order History</title>

    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/orders.css">

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/security.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth-guard.js"></script>

    <meta name="theme-color" content="#0b1220">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Data4Ghana">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="images/icons/apple-touch-icon.png">
</head>

<body>
    <div id="menu-container"></div>
    <button class="menu-btn" onclick="openMenu()">☰</button>

    <div class="main-content">
        <!-- HERO BANNER -->
        <div class="orders-hero">
            <div class="hero-content">
                <div class="hero-badge">E-commerce</div>
                <h1>Order History</h1>
                <p>Track your data bundle orders, check status, and manage your history in one place.</p>
            </div>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-label">Total Orders</span>
                    <span class="stat-value" id="totalOrdersCount">0</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">Completed</span>
                    <span class="stat-value" id="completedOrdersCount">0</span>
                </div>
            </div>
        </div>

        <div class="container">
            <!-- TABS -->
            <div class="order-tabs">
                <button class="tab-btn active" onclick="switchCategory('data')" id="tabData">
                    <span class="tab-icon">🌐</span> Data Bundles
                </button>
                <button class="tab-btn" onclick="switchCategory('ecard')" id="tabEcard">
                    <span class="tab-icon">🎫</span> E-Cards
                </button>
            </div>

            <!-- SEARCH & FILTERS -->
            <div class="filter-section card">
                <div class="filter-header">
                    <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
                        </svg> Filter Records</h3>
                    <button class="reset-btn" onclick="resetFilters()">Reset</button>
                </div>
                <div class="search-box">
                    <div class="input-wrapper">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.3-4.3" />
                        </svg>
                        <input type="text" id="searchOrder" placeholder="Search ID or Product...">
                    </div>

                    <select id="statusFilter">
                        <option value="">All Status</option>
                        <option value="Completed">Completed</option>
                        <option value="Refunded">Refunded</option>
                        <option value="Pending">Pending</option>
                        <option value="Processing">Processing</option>
                        <option value="Undelivered">Undelivered</option>
                        <option value="In transit">In transit</option>
                    </select>

                    <input type="date" id="dateFilter">

                    <div class="input-wrapper">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                        </svg>
                        <input type="text" id="phoneFilter" placeholder="Phone number...">
                    </div>

                    <select id="perPageFilter" onchange="changePerPage()" style="min-width:110px;">
                        <option value="10">10 / page</option>
                        <option value="20">20 / page</option>
                        <option value="50">50 / page</option>
                        <option value="all">Show All</option>
                    </select>
                </div>
            </div>

            <!-- TABLE -->
            <div class="card responsive-table-wrapper">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Status</th>
                                <th>Recipient</th>
                                <th>PLAN</th>
                                <th>BF</th>
                                <th>PRICES</th>
                                <th>AF</th>
                                <th>Network</th>
                                <th>Delivered</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTable">
                            <tr class="loading">
                                <td colspan="8">
                                    <div class="loading-state">
                                        <div class="spinner"></div>
                                        <span>Fetching your orders...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- PAGINATION BAR -->
            <div id="paginationBar" style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:14px 4px; text-align:center;">
                <span id="paginationInfo" style="font-size:13px; color:#64748b; font-weight:500;"></span>
                <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:6px;" id="paginationButtons"></div>
            </div>
        </div>
    </div>

    <script src="js/menu.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/pwa-install.js"></script>

</body>

</html>
